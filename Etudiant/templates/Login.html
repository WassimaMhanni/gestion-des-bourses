{% extends "base.html" %}
{% block content %}
<div class="container mt-3 mb-5">
    <div class="row mt-5 mb-5 shadow">
        <!-- Form Section -->
        <div class="col-lg-6 shadow p-4">
            <h3>Connexion</h3>
            <form>
                <div class="form-group">
                  <label for="exampleInputEmail1">Addresse email</label>
                  <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                  <small id="emailHelp" class="form-text text-muted">saisir votre email correcttttttttt.</small>
                </div>
                <div class="form-group">
                  <label for="exampleInputPassword1">Mot de passe</label>
                  <input type="password" class="form-control" id="exampleInputPassword1">
                </div>
                <div class="form-group form-check">
                  <input type="checkbox" class="form-check-input" id="exampleCheck1">
                  <label class="form-check-label" for="exampleCheck1">Selectionnez</label>
                </div>
                <button type="submit" class="btn btn-primary">Connectez</button>
            </form>
        </div>

        <!-- Image Section -->
        <div class="col-lg-6 d-flex align-items-center">
            <img src="https://img.freepik.com/vecteurs-premium/concept-inscription-inscription-ligne-smartphone-page-formulaire-connexion-mot-passe-ecran_735449-673.jpg" 
                 alt="Inscription illustration" 
                 class="img-fluid mx-auto d-block">
        </div>
    </div>
</div>
{% endblock %}
